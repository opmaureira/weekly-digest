name: Daily News Digest

on:
  schedule:
    # Runs every day at 08:00 CLT (= 11:00 UTC in summer, 12:00 UTC in winter)
    - cron: "0 11 * * *"
  workflow_dispatch:   # allows manual trigger from GitHub UI

permissions:
  contents: write      # needed to commit the generated index.html

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install feedparser

      - name: Run digest
        run: python run.py

      - name: Commit & push updated site
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html data/news.json
          git diff --cached --quiet || git commit -m "chore: daily digest $(date -u +'%Y-%m-%d')"
          git push
